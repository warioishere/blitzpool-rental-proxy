[package]
name = "stratum-rental-proxy"
version = "0.1.0"
edition = "2021"
description = "Stratum hashrate-rental proxy: sellers' miners run on their own default pool until rented, then are server-side rerouted to the buyer's target — no miner reconfiguration. Stratum V1 first, V2 planned."
license = "AGPL-3.0-or-later"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "sync", "time", "macros", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
anyhow = "1"

[profile.release]
lto = "thin"
